{% extends "base.html" %}
{% block title_suffix %} — Login{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="logo">WARBOARD <span>V2</span></h1>
    <p class="tagline">Tabletop Simulator</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <label>Display Name</label>
      <input type="text" name="username" required autocomplete="off"
             placeholder="Enter your name..." maxlength="32" />
      <button type="submit" class="btn btn-primary w-full">Enter</button>
    </form>

    <div class="divider">or</div>
    <a href="{{ url_for('guest_login') }}" class="btn btn-guest w-full">Quick Test (Guest)</a>
  </div>
</div>
{% endblock %}
